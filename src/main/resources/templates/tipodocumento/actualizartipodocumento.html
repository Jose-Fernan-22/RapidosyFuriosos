<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rapidos y Furiosos | Actualizar Tipo Documento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h1>Actualización de Tipo de Documento</h1>
        <form th:action="@{/tipodocumento/actualizar/{id}(id=${listatipodocumento.codigo})}" method="post" th:object="${listatipodocumento}">
            <div class="col-6 mb-3">
                <label for="txtCod" class="form-label">Código:</label>
                <input type="text" class="form-control" id="txtCod" readonly th:field="*{codigo}">
            </div>
            <div class="col-6 mb-3">
                <label for="txtNom" class="form-label">Nombre del Tipo de Documento:</label>
                <input type="text" class="form-control" id="txtNom" th:field="*{nombre}">
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Estado:</label>
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="chkEst" th:field="*{estado}">
                    <label class="form-check-label" for="chkEst">Habilitado</label>
                </div>
            </div>
            <button type="submit" class="btn btn-success">Actualizar</button>
            <a th:href="@{/tipodocumento/listar}" class="btn btn-dark">Regresar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
