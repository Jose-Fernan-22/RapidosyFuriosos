<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rapidos y Furiosos | Mostrar Vehículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h1>Listado de Vehículos</h1>
        <a th:href="@{/vehiculo/registro}" class="btn btn-primary">Registrar Vehículo</a>
        <a th:href="@{/vehiculo/habilita}" class="btn btn-warning">Habilitar Vehículo</a>
        <a th:href="@{/menuprincipal}" class="btn btn-dark">Regresar</a>
        <div class="mb-3"></div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Código</th>
                        <th scope="col">Placa</th>
                        <th scope="col">Modelo</th>
                        <th scope="col">Año</th>
                        <th scope="col">Marca</th>
                        <th scope="col">Color</th>
                        <th scope="col">Propietario / Cliente</th>
                        <th scope="col">Estado</th>
                        <th scope="col">Actualizar</th>
                        <th scope="col">Eliminar</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="veh : ${listarvehiculo}">
                        <th scope="row" th:text="${veh.codigo}"></th>
                        <td th:text="${veh.placa}"></td>
                        <td th:text="${veh.modelo}"></td>
                        <td th:text="${veh.anio}"></td>
                        <td th:text="${veh.marca.nombre}"></td>
                        <td th:text="${veh.color.nombre}"></td>
                        <td th:text="${veh.cliente.nombre + ' ' + veh.cliente.apellidopaterno + ' ' + veh.cliente.apellidomaterno}"></td>
                        <td th:text="${veh.estado} ? 'Habilitado':'Deshabilitado'"></td>
                        <td><a th:href="@{/vehiculo/actualiza/{id}(id=${veh.codigo})}" class="btn btn-success">Seleccionar</a></td>
                        <td><a th:href="@{/vehiculo/eliminar/{id}(id=${veh.codigo})}" class="btn btn-danger">Seleccionar</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
