<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rapidos y Furiosos | Actualizar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h1>Actualización Cliente</h1>
        <form th:action="@{/cliente/actualizar/{id}(id=${listarcliente.codigo})}" method="post" th:object="${listarcliente}">

            <div class="row mb-3">
                <div class="col-6">
                    <label for="txtCod" class="form-label">Código:</label>
                    <input type="text" class="form-control" id="txtCod" readonly th:field="*{codigo}">
                </div>
                <div class="col-6">
                    <label for="txtNom" class="form-label">Nombre:</label>
                    <input type="text" class="form-control" id="txtNom" th:field="*{nombre}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="txtApep" class="form-label">Apellido Paterno:</label>
                    <input type="text" class="form-control" id="txtApep" th:field="*{apellidopaterno}">
                </div>
                <div class="col-6">
                    <label for="txtApem" class="form-label">Apellido Materno:</label>
                    <input type="text" class="form-control" id="txtApem" th:field="*{apellidomaterno}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="cboTipoDocumento" class="form-label">Tipo de Documento</label>
                    <select class="form-select" id="cboTipoDocumento" th:field="*{tipodocumento}">
                        <option value="0">Seleccione un tipo de documento</option>
                        <option th:each="td : ${listartipodocumento}" th:value="${td.codigo}" th:text="${td.nombre}"></option>
                    </select>
                </div>
                <div class="col-6">
                    <label for="txtNumDoc" class="form-label">Número de documento:</label>
                    <input type="text" class="form-control" id="txtNumDoc" th:field="*{numerodocumento}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="txtFec" class="form-label">Fecha de nacimiento:</label>
                    <input type="date" class="form-control" id="txtFec" th:field="*{fecha}">
                </div>
                <div class="col-6">
                    <label for="txtDir" class="form-label">Dirección:</label>
                    <textarea class="form-control" id="txtDir" th:field="*{direccion}"></textarea>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="cboDistrito" class="form-label">Distrito:</label>
                    <select class="form-select" id="cboDistrito" th:field="*{distrito}">
                        <option value="0">Seleccione un distrito</option>
                        <option th:each="dis : ${listardistrito}" th:value="${dis.codigo}" th:text="${dis.nombre}"></option>
                    </select>
                </div>
                <div class="col-6">
                    <label for="txtTel" class="form-label">Teléfono:</label>
                    <input type="text" class="form-control" id="txtTel" th:field="*{telefono}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="txtCel" class="form-label">Celular:</label>
                    <input type="text" class="form-control" id="txtCel" th:field="*{celular}">
                </div>
                <div class="col-6">
                    <label for="txtCor" class="form-label">Correo:</label>
                    <input type="email" class="form-control" id="txtCor" th:field="*{correo}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="cboSexo" class="form-label">Sexo:</label>
                    <select class="form-select" id="cboSexo" th:field="*{sexo}">
                        <option value="0">Seleccione un sexo</option>
                        <option th:each="sex : ${listarsexo}" th:value="${sex.codigo}" th:text="${sex.nombre}"></option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label">Estado:</label>
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="chkEst" th:field="*{estado}">
                        <label class="form-check-label" for="chkEst">Habilitado</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-success">Actualizar</button>
            <a th:href="@{/cliente/listar}" class="btn btn-dark">Regresar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
