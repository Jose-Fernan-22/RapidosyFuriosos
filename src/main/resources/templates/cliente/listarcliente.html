<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rapidos y Furiosos | Mostrar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h1>Listado de Clientes</h1>
        <a th:href="@{/cliente/registro}" class="btn btn-primary">Registrar Cliente</a>
        <a th:href="@{/cliente/habilita}" class="btn btn-warning">Habilitar Cliente</a>
        <a th:href="@{/menuprincipal}" class="btn btn-dark">Regresar</a>
        <div class="mb-3"></div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Código</th>
                        <th scope="col">Nombre y Apellidos</th>
                        <th scope="col">Documentos</th>
                        <th scope="col">Fec. Registro</th>
                        <th scope="col">Dirección</th>
                        <th scope="col">Teléfono</th>
                        <th scope="col">Celular</th>
                        <th scope="col">Correo</th>
                        <th scope="col">Sexo</th>
                        <th scope="col">Estado</th>
                        <th scope="col">Actualizar</th>
                        <th scope="col">Eliminar</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cli : ${listarcliente}">
                        <th scope="row" th:text="${cli.codigo}"></th>
                        <td th:text="${cli.nombre + ' ' + cli.apellidopaterno + ' ' + cli.apellidomaterno}"></td>
                        <td th:text="${cli.tipodocumento.nombre + ' - ' + cli.numerodocumento}"></td>
                        <td th:text="${cli.fecha}"></td>
                        <td th:text="${cli.direccion + ' - ' + cli.distrito.nombre}"></td>
                        <td th:text="${cli.telefono}"></td>
                        <td th:text="${cli.celular}"></td>
                        <td th:text="${cli.correo}"></td>
                        <td th:text="${cli.sexo.nombre}"></td>
                        <td th:text="${cli.estado} ? 'Habilitado':'Deshabilitado'"></td>
                        <td><a th:href="@{/cliente/actualiza/{id}(id=${cli.codigo})}" class="btn btn-success">Seleccionar</a></td>
                        <td><a th:href="@{/cliente/eliminar/{id}(id=${cli.codigo})}" class="btn btn-danger">Seleccionar</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
