<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">


<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rapidos y Furiosos | Mostrar Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>


<body>
    <div class="container">
        <h1>Listado de Empleado</h1>
        <a th:href="@{/empleado/registro}" class="btn btn-primary">Registrar Empleado</a>
        <a th:href="@{/empleado/habilita}"  class="btn btn-warning">Habilitar Empleado</a>
        <a th:href="@{/menuprincipal}" class="btn btn-dark">Regresar</a>
        <div class="mb-3"></div>
        <!-- inicio de tabla -->
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Codigo</th>
                        <th scope="col">Nombre y Apellidos</th>
                        <th scope="col">Documentos</th>
                        <th scope="col">Fec. Nacimiento</th>
                        <th scope="col">Direccion</th>
                        <th scope="col">Telefono</th>
                        <th scope="col">Celular</th>
                        <th scope="col">Correo</th>
                        <th scope="col">Sexo</th>
                        <th scope="col">Rol</th>
                        <th scope="col">Sueldo</th>
                        <th scope="col">Usuario</th>
                        <th scope="col">Estado</th>
                        <th scope="col">Actualizar</th>
                        <th scope="col">Eliminar</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- generamos los valores de la tabla desde la lista de distritos -->
                    <tr th:each="emp : ${listarempleado}">
                        <th scope="row" th:text="${emp.codigo}"></th>
                        <td th:text="${emp.nombre + ' '+ emp.apellidopaterno + ' ' + emp.apellidomaterno}"></td>
                        <td th:text="${emp.tipodocumento.nombre + ' - ' + emp.numerodocumento}"></td>
                        <td th:text="${emp.fechanacimiento}"></td>
                        <td th:text="${emp.direccion + ' - ' + emp.distrito.nombre}"></td>
                        <td th:text="${emp.telefono}"></td>
                        <td th:text="${emp.celular}"></td>
                        <td th:text="${emp.correo}"></td>
                        <td th:text="${emp.sexo.nombre}"></td>
                        <td th:text="${emp.rol.nombre}"></td>
                        <td th:text="${emp.sueldo}"></td>
                        <td th:text="${emp.usuario}"></td>
                        <td th:text="${emp.estado} ? 'Habilitado':'Deshabilitado'"></td>
                        <td><a th:href="@{/empleado/actualiza/{id}(id=${emp.codigo})}" class="btn btn-success">Seleccionar</a></td>
                        <td><a th:href="@{/empleado/eliminar/{id}(id=${emp.codigo})}" class="btn btn-danger">Seleccionar</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- fin de la tabla -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>


</html>
