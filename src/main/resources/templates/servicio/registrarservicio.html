<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rapidos y Furiosos | Registrar Servicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h1>Registro de Servicio</h1>
        <form th:action="@{/servicio/registrar}" method="post" th:object="${servicio}">
            <div class="col-6 mb-3">
                <label for="txtNom" class="form-label">Nombre del Servicio:</label>
                <input type="text" class="form-control" id="txtNom" placeholder="Ej. Cambio de aceite" required th:field="*{nombre}">
            </div>
            <div class="col-6 mb-3">
                <label for="txtDesc" class="form-label">Descripción:</label>
                <textarea class="form-control" id="txtDesc" rows="3" placeholder="Detalla en qué consiste el servicio" required th:field="*{descripcion}"></textarea>
            </div>
            <div class="col-6 mb-3">
                <label for="txtPre" class="form-label">Precio (S/.):</label>
                <input type="number" step="0.01" class="form-control" id="txtPre" placeholder="Ej. 150.00" required th:field="*{precio}">
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Estado:</label>
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="chkEst" th:field="*{estado}">
                    <label class="form-check-label" for="chkEst">Habilitado</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Registrar</button>
            <a th:href="@{/servicio/listar}" class="btn btn-dark">Regresar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
